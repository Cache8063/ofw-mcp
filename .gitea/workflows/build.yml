name: ci-cd

# test -> build -> push -> (guarded) provision secrets -> recreate -> pin.
# Mirrors Arcnode.xyz/janet-core's pipeline. The deploy/provision/pin steps are
# GUARDED on OFW_USERNAME being set: until Bryan adds the OFW_* Actions secrets,
# a push just builds+pushes the image and skips every prod-touching step. So
# this file is safe to land before the MCP-Servers service + secrets exist.
#
# Required org/repo secrets (shared, already present from janet-core):
#   REGISTRY_USER  REGISTRY_TOKEN  MCP_HOST_SSH_KEY  RELEASE_TOKEN
# New per-repo secrets Bryan sets (deploy stays skipped until OFW_USERNAME set):
#   OFW_USERNAME  OFW_PASSWORD  OFW_CACHE_KEY

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitea/workflows/**'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: gitea.ts.bkb.cx:3000/arcnode.xyz/ofw-mcp
  SERVICE: ofw-mcp
  SECRET_FILE: /opt/mcp/ofw-mcp/secrets/ofw.env

jobs:
  ci-cd:
    runs-on: host
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Short SHA
        id: vars
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # ---- GATE: test + 100% coverage in a clean node:22 container (prod base) ----
      - name: Test (vitest, 100% coverage gate)
        run: |
          docker run --rm \
            -e NPM_CONFIG_CACHE=/tmp/npm \
            -v "$PWD":/w -w /w node:22-slim sh -ec '
              npm ci
              npm run build
              npm run test:coverage
            '

      - name: Log in to Gitea registry
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" \
            | docker login gitea.ts.bkb.cx:3000 -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ steps.vars.outputs.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push
        run: |
          docker push ${{ env.IMAGE }}:${{ steps.vars.outputs.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Set up SSH to mcp-host
        env:
          DEPLOY_KEY: ${{ secrets.MCP_HOST_SSH_KEY }}
        run: |
          KEY=/tmp/deploy-key-${{ github.run_id }}
          printf '%s\n' "$DEPLOY_KEY" > "$KEY"
          chmod 600 "$KEY"
          echo "KEY_PATH=$KEY" >> "$GITHUB_ENV"

      # ---- GUARDED: everything below no-ops until the OFW_* secrets are set ----
      - name: Provision OFW secrets on mcp-host (skip if unset)
        # Writes the three OFW_* Actions secrets to the off-rsync-tree env_file
        # that the compose service reads. Piped over ssh stdin so values never
        # land in a process arg; Gitea masks them in logs. Idempotent + durable
        # (survives host.yml rsync --delete because it's outside /opt/mcp tree...
        # note: path is under /opt/mcp/ofw-mcp/secrets which we keep gitignored).
        env:
          OFW_USERNAME: ${{ secrets.OFW_USERNAME }}
          OFW_PASSWORD: ${{ secrets.OFW_PASSWORD }}
          OFW_CACHE_KEY: ${{ secrets.OFW_CACHE_KEY }}
        run: |
          if [ -z "$OFW_USERNAME" ]; then
            echo "OFW_USERNAME not set — skipping provision + deploy (image built/pushed only)."
            echo "SKIP_DEPLOY=1" >> "$GITHUB_ENV"
            exit 0
          fi
          # Build the env_file content locally, pipe via stdin.
          { printf 'OFW_USERNAME=%s\n' "$OFW_USERNAME"
            printf 'OFW_PASSWORD=%s\n' "$OFW_PASSWORD"
            printf 'OFW_CACHE_KEY=%s\n' "$OFW_CACHE_KEY"
          } | ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 -i "$KEY_PATH" \
              root@mcp-host.ts.bkb.cx '
                umask 077
                mkdir -p /opt/mcp/ofw-mcp/secrets
                cat > /opt/mcp/ofw-mcp/secrets/ofw.env
                chmod 600 /opt/mcp/ofw-mcp/secrets/ofw.env
                echo "provisioned ofw.env ($(wc -l < /opt/mcp/ofw-mcp/secrets/ofw.env) lines)"
              '

      - name: "Deploy (pin sha + force-recreate on mcp-host)"
        if: ${{ env.SKIP_DEPLOY != '1' }}
        run: |
          ssh -n -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 -i "$KEY_PATH" root@mcp-host.ts.bkb.cx '
            set -e
            cd /opt/mcp
            docker login gitea.ts.bkb.cx:3000 -u "${{ secrets.REGISTRY_USER }}" -p "${{ secrets.REGISTRY_TOKEN }}"
            cp docker-compose.yml docker-compose.yml.bak
            sed -i -E "s#(image: .*/ofw-mcp):[^[:space:]]+#\1:${{ steps.vars.outputs.sha }}#" docker-compose.yml
            if ! docker compose config -q; then
              echo "compose invalid after pin — restoring"; mv docker-compose.yml.bak docker-compose.yml; exit 1
            fi
            rm -f docker-compose.yml.bak
            docker compose pull ${{ env.SERVICE }}
            docker compose up -d --no-deps --force-recreate ${{ env.SERVICE }}
            docker compose ps ${{ env.SERVICE }}
          '

      - name: "Smoke (read-only health + tools/list, no OFW writes)"
        if: ${{ env.SKIP_DEPLOY != '1' }}
        run: |
          ssh -n -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 -i "$KEY_PATH" root@mcp-host.ts.bkb.cx '
            set -e
            ok=
            for i in $(seq 1 10); do
              if docker exec ${{ env.SERVICE }} node -e "fetch(\"http://127.0.0.1:7330/healthz\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
                echo "healthy after $i tries"; ok=1; break
              fi
              sleep 3
            done
            [ -n "$ok" ] || { echo "healthcheck failed"; docker logs ${{ env.SERVICE }} --tail 50; exit 1; }
            # initialize handshake must return serverInfo; write tools must be ABSENT (WRITE_MODE=none default).
            SID=$(curl -s -D - -o /dev/null -X POST http://127.0.0.1:7330/mcp \
              -H "Content-Type: application/json" -H "Accept: application/json, text/event-stream" \
              -d "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2025-06-18\",\"capabilities\":{},\"clientInfo\":{\"name\":\"ci-smoke\",\"version\":\"0\"}}}" \
              | grep -i "^mcp-session-id:" | tr -d "\r" | awk "{print \$2}")
            [ -n "$SID" ] || { echo "no session id from initialize"; exit 1; }
            TOOLS=$(curl -s -X POST http://127.0.0.1:7330/mcp -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" -H "mcp-session-id: $SID" \
              -d "{\"jsonrpc\":\"2.0\",\"id\":2,\"method\":\"tools/list\"}")
            echo "$TOOLS" | grep -q "ofw_get_notifications" || { echo "read tools missing"; exit 1; }
            echo "$TOOLS" | grep -q "ofw_send_message" && { echo "WRITE TOOL PRESENT under default none — refusing"; exit 1; }
            echo "smoke OK (read tools present, write tools absent)"
          '

      - name: Record image pin in MCP-Servers git
        if: ${{ env.SKIP_DEPLOY != '1' }}
        env:
          GIT_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -e
          SHA="${{ steps.vars.outputs.sha }}"; IMG="${{ env.IMAGE }}"
          tmp=$(mktemp -d)
          git clone -q "https://oauth2:${GIT_TOKEN}@gitea.ts.bkb.cx/Arcnode.xyz/MCP-Servers.git" "$tmp"
          cd "$tmp"
          git config user.name "ci-bot"; git config user.email "ci@arcnode.xyz"
          sed -i -E "s#(image: )$IMG:[^[:space:]]+#\1$IMG:$SHA#" infra/mcp-host/docker-compose.yml
          if git diff --quiet; then echo "pin already at $SHA"; exit 0; fi
          git commit -aqm "chore(pin): ofw-mcp -> $SHA [skip ci]"
          for i in 1 2 3 4 5; do
            if git pull -q --rebase origin main && git push -q origin main; then echo "pinned -> $SHA"; exit 0; fi
            sleep 3
          done
          echo "failed to push pin"; exit 1

      - name: Cleanup
        if: always()
        run: rm -f "$KEY_PATH"
